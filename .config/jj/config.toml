#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Jonathan Cormier"
email = "jonathan@cormier.co"

[ui]
editor = "nvim"
default-command = ["status"]
show-cryptographic-signatures = true
pager = "delta"
merge-editor = "nvim3"
diff-editor = ":builtin"
#log-synthetic-elided-nodes = false

[merge-tools.nvim3]
program = "nvim"
merge-args = ["-d", "$left", "$base", "$right", "$output"]

[signing]
behavior = "own"
backend = "gpg"
sign-all = true
key = "34CD09BD8A253BB518746C3E3C15099390069BAF"

[git]
sign-on-push = true

[aliases]
bump = ["bookmark", "move", "--to", "latest(::@ ~ empty())"]
bump-fwd = ["bookmark", "move", "--to", "last(@:: ~ empty())"]
forget = ["abandon"]
l = ["log"]
n = ["new"]
st = ["status"]
d = ["diff"]
dp = ["diff", "-r", "@-"]
si = ["split", "-i"]
sq = ["squash"]
bk = ["bookmark", "list"]
push = ["git", "push"]
fetch = ["git", "fetch"]
clone = ["git", "clone"]
wip-age = [
	"log",
	"--no-graph",
	"--reversed",
	"-r",
	"mutable() & ~empty() & mine()",
	"-T",
	"concat(change_id.shortest(4), \" \", description.first_line(), \" (\", committer.timestamp().ago(), \")\\n\")"]
el = ["evolog"]
booklog = ["bl"]
bl = ["util", "exec", "--", "bash", "-c", """
  rev="${1:-trunk()}"
  jj log --reversed -r "$rev::@"
""", "--"]
ai-describe = ["util", "exec", "--", "bash", "-c", """
  rev="${1:-@}"
  jj diff -r "$rev" | claude -p 'Write a concise commit message for these changes in the conventional commits format' | jj describe -r "$rev" --stdin --editor
""", "--"]
track-remote = ["util", "exec", "--", "bash", "-c", """
  pattern="${1:-.}"
  jj bookmark list --all-remotes | grep -E "$pattern" | grep '@' | awk '{print $1}' | xargs -I{} jj bookmark track {}
""", "--"]
tag-at = ["util", "exec", "--", "bash", "-c", """
  if [ $# -lt 2 ]; then
    echo "Usage: jj tag-at <rev> <tagname> [git-tag-args...]" >&2
    exit 1
  fi
  rev="$1"
  tagname="$2"
  shift 2
  sha=$(jj log --no-graph -r "$rev" -T 'commit_id' --limit 1) || exit 1
  git tag "$@" "$tagname" "$sha"
""", "--"]

[revset-aliases]
"wip" = "description(exact:'') & mine()"
"stacked" = "ancestors(@, 5) ~ immutable_heads()"

[template-aliases]
'format_short_cryptographic_signature(sig)' = '''
if(sig,
  if(sig.status() == "good", "🔒",
    if(sig.status() == "unknown", "❓",
      if(sig.status() == "bad", "💀",
        sig.status()
      )
    )
  ),
  "🚫",
)
'''

[templates]
log = "builtin_log_oneline"
